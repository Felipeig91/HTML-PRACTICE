<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>add styles</title>
    <style>
      :root {
        --bg: #eef4fb;
        --card: #ffffff;
        --border: #d6e3f0;
        --text: #1e2d3d;
        --muted: #64748b;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f5f8ff 0%, #e4efff 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .container {
        width: 100%;
        max-width: 640px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 28px 60px rgba(15, 20, 50, 0.12);
        padding: 32px;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 2rem;
        letter-spacing: -0.03em;
        color: #0f172a;
      }

      form {
        display: grid;
        gap: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #334155;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      input[type="date"],
      input[type="url"],
      input[type="number"],
      input[type="password"],
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 1rem;
        background: #f8fbff;
        color: var(--text);
      }

      textarea {
        resize: vertical;
        min-height: 110px;
      }

      input[type="radio"],
      input[type="checkbox"] {
        margin-right: 8px;
      }

      .field-inline {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .field-inline label {
        margin-bottom: 0;
        font-weight: 500;
      }

      .checkbox-group,
      .radio-group {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
      }

      .submit-row {
        margin-top: 8px;
      }

      input[type="submit"] {
        width: 100%;
        padding: 16px 20px;
        border: none;
        border-radius: 14px;
        background: var(--primary);
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      input[type="submit"]:hover {
        background: var(--primary-hover);
      }

      small {
        display: block;
        color: var(--muted);
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
    <!-- Título visible del formulario -->
    <h1>Sign Up Form</h1>

    <!-- Formulario de registro / sign up -->
    <form action="" method="post">
      <!-- Campo para el nombre completo -->
      <label for="fullname">Full Name:</label>
      <input
        type="text"
        id="fullname"
        name="fullname"
        placeholder="Enter your full name"
        required
      />
      <br /><br />

      <!-- Campo para el correo electrónico -->
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required
      />
      <br /><br />

      <!-- Campo para el teléfono -->
      <label for="phone">Phone:</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Enter your phone number"
      />
      <br /><br />

      <!-- Campo para la fecha de nacimiento -->
      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
      <br /><br />

      <!-- Campo de URL personal o sitio web -->
      <label for="website">Website:</label>
      <input
        type="url"
        id="website"
        name="website"
        placeholder="https://example.com"
      />
      <br /><br />

      <!-- Campo de número (edad, por ejemplo) -->
      <label for="age">Age:</label>
      <input
        type="number"
        id="age"
        name="age"
        min="13"
        max="120"
        placeholder="Enter your age"
      />
      <br /><br />

      <!-- Campo de área de texto para una breve biografía -->
      <label for="bio">Bio:</label>
      <br />
      <textarea
        id="bio"
        name="bio"
        rows="4"
        cols="40"
        placeholder="Tell us about yourself"
      ></textarea>
      <br /><br />

      <!-- Radio buttons para seleccionar género -->
      <label>Gender:</label>
      <input type="radio" id="gender-male" name="gender" value="male" />
      <label for="gender-male">Male</label>
      <input type="radio" id="gender-female" name="gender" value="female" />
      <label for="gender-female">Female</label>
      <input type="radio" id="gender-other" name="gender" value="other" />
      <label for="gender-other">Other</label>
      <br /><br />

      <!-- Checkbox para aceptar términos -->
      <input type="checkbox" id="terms" name="terms" required />
      <label for="terms">I accept the terms and conditions</label>
      <br /><br />

      <!-- Lista desplegable -->
      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="">Select country</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="ca">Canada</option>
        <option value="au">Australia</option>
      </select>
      <br /><br />

      <!-- Botón de envío -->
      <input type="submit" value="Sign Up" />
    </form>
    </div>
  </body>
</html>
