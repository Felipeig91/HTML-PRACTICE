<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create a sign form</title>
  </head>
  <body>
    <!-- Título visible del formulario -->
    <h1>Sign Up Form</h1>

    <!-- Formulario de registro / sign up -->
    <form action="" method="post">
      <!-- Campo para el nombre completo -->
      <label for="fullname">Full Name:</label>
      <input
        type="text"
        id="fullname"
        name="fullname"
        placeholder="Enter your full name"
        required
      />
      <br /><br />

      <!-- Campo para el correo electrónico -->
      <label for="email">Email:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Enter your email"
        required
      />
      <br /><br />

      <!-- Campo para el teléfono -->
      <label for="phone">Phone:</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="Enter your phone number"
      />
      <br /><br />

      <!-- Campo para la fecha de nacimiento -->
      <label for="birthday">Birthday:</label>
      <input type="date" id="birthday" name="birthday" />
      <br /><br />

      <!-- Campo de URL personal o sitio web -->
      <label for="website">Website:</label>
      <input
        type="url"
        id="website"
        name="website"
        placeholder="https://example.com"
      />
      <br /><br />

      <!-- Campo de número (edad, por ejemplo) -->
      <label for="age">Age:</label>
      <input
        type="number"
        id="age"
        name="age"
        min="13"
        max="120"
        placeholder="Enter your age"
      />
      <br /><br />

      <!-- Campo de área de texto para una breve biografía -->
      <label for="bio">Bio:</label>
      <br />
      <textarea
        id="bio"
        name="bio"
        rows="4"
        cols="40"
        placeholder="Tell us about yourself"
      ></textarea>
      <br /><br />

      <!-- Radio buttons para seleccionar género -->
      <label>Gender:</label>
      <input type="radio" id="gender-male" name="gender" value="male" />
      <label for="gender-male">Male</label>
      <input type="radio" id="gender-female" name="gender" value="female" />
      <label for="gender-female">Female</label>
      <input type="radio" id="gender-other" name="gender" value="other" />
      <label for="gender-other">Other</label>
      <br /><br />

      <!-- Checkbox para aceptar términos -->
      <input type="checkbox" id="terms" name="terms" required />
      <label for="terms">I accept the terms and conditions</label>
      <br /><br />

      <!-- Lista desplegable -->
      <label for="country">Country:</label>
      <select id="country" name="country">
        <option value="">Select country</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="ca">Canada</option>
        <option value="au">Australia</option>
      </select>
      <br /><br />

      <!-- Botón de envío -->
      <input type="submit" value="Sign Up" />
    </form>
  </body>
</html>
