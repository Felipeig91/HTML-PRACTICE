<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New input types</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .form-container {
        max-width: 600px;
        width: 100%;
        background: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }
      h1 {
        text-align: center;
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 8px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      @media (max-width: 600px) {
        body {
          padding: 10px;
        }
        .form-container {
          padding: 15px;
        }
        input {
          font-size: 16px; /* Prevent zoom on iOS */
        }
      }
    </style>
<body>
    <h1>New input types</h1>
    <div class="form-container">
      <!-- date -->
      <label for="date">Select a date:</label>
      <input type="date" id="date" name="date" />
      <br />
      <br />
      <!-- time -->
      <label for="time">Select a time:</label>
      <input type="time" id="time" name="time" />
      <br />
      <br />
      <!-- datetime-local -->
      <label for="datetime-local">Select a date and time:</label>
      <input type="datetime-local" id="datetime-local" name="datetime-local" />
      <br />
      <br />
      <!-- month -->
      <label for="month">Select a month:</label>
      <input type="month" id="month" name="month" />
      <br />
      <br />
      <!-- week -->
      <label for="week">Select a week:</label>
      <input type="week" id="week" name="week" />
      <br />
        <br />
        <!-- color -->
        <label for="color">Choose a color:</label>
        <input type="color" id="color" name="color" value="#ff0000" />
        <br />
        <br />
        <!-- email -->
        <label for="email">Enter your email:</label>
        <input type="email" id="email" name="email" />
        <br />
        <br />
        <!-- number -->
        <label for="number">Enter a number:</label>
        <input type="number" id="number" name="number" />
        <br />
        <br />
        <!-- range -->
        <label for="range">Select a range:</label>
        <input type="range" id="range" name="range" min="0" max="100" />
        <br />
        <br />
        <!-- tel -->
        <label for="tel">Enter your phone number:</label>
        <input type="tel" id="tel" name="tel" />
        <br />
        <br />
        <!-- url -->
        <label for="url">Enter a URL:</label>
        <input type="url" id="url" name="url" />
        <br />
        <br />
        <!-- datalist -->
        <label for="browsers">Choose a browser:</label>
        <input list="browsers" id="browsers" name="browsers" />
        <datalist id="browsers">
          <option value="Edge"></option>
          <option value="Firefox"></option>
          <option value="Chrome"></option>
          <option value="Opera"></option>
          <option value="Safari"></option>
        </datalist>
        <br />
        <br />
        <!-- file -->   
        <label for="file">Upload a file:</label>
        <input type="file" id="file" name="file" />
        <br />
        <br />
        <!-- hidden -->
        <input type="hidden" id="hidden" name="hidden" value="This is
    a hidden input" />
    </div>
    <div>
      <!-- Add more form elements as needed -->
</body>
</html>
