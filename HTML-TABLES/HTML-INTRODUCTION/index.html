<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>tables</title>
    <style>
      table {
        width: 700px;
        background-color: lightblue;
        margin-top: 24px;
        margin-left: 24px;
      }

      table,
      td,
      th {
        border: 1px solid black;
        border-collapse: collapse;
        font-size: 24px;
      }

      td,
      th {
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <table>
      <caption>
        Table Caption
      </caption>
      <tr>
        <th>Header 1</th>
        <th>Header 2</th>
        <th>Header 3</th>
        <th>Header 4</th>
      </tr>
      <tr>
        <td>Cell 1</td>
        <td>Cell 2</td>
        <td>Cell 3</td>
        <td>Cell 4</td>
      </tr>
      <tr>
        <td>Cell 5</td>
        <td>Cell 6</td>
        <td>Cell 7</td>
        <td>Cell 8</td>
      </tr>
      <tr>
        <td>Cell 9</td>
        <td>Cell 10</td>
        <td>Cell 11</td>
        <td>Cell 12</td>
      </tr>
    </table>
  </body>
</html>
