<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarjeta de Producto - Ejemplo Práctico</title>
    <style>
      /* ========== ESTILOS GENERALES ========== */
      * {
        /* El asterisco (*) selecciona TODOS los elementos */
        /* Eliminamos los márgenes y espacios internos por defecto */
        margin: 0;
        padding: 0;
        /* Hace que el ancho incluya padding y border */
        box-sizing: border-box;
      }

      body {
        /* Fuente base para todo el documento */
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        /* Color de fondo gris claro */
        background-color: #f5f5f5;
        /* Espacio interno del body */
        padding: 20px;
        /* Alineamos los elementos al centro usando flexbox */
        display: flex;
        justify-content: center;
        align-items: center;
        /* Altura mínima: altura del viewport */
        min-height: 100vh;
      }

      /* ========== CONTENEDOR PRINCIPAL ========== */
      .contenedor {
        /* Ancho máximo para que no sea demasiado grande */
        max-width: 400px;
        /* Sombra: desplazamiento-x, desplazamiento-y, desenfoque, color */
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        /* Fondo blanco */
        background-color: white;
        /* Esquinas redondeadas */
        border-radius: 12px;
        /* Desbordamiento oculto para que no salga contenido de las esquinas */
        overflow: hidden;
        /* Transición suave para efectos hover */
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* EFECTO HOVER - Cuando pasas el ratón sobre la tarjeta */
      .contenedor:hover {
        /* Levanta la tarjeta hacia arriba */
        transform: translateY(-10px);
        /* Sombra más pronunciada */
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      }

      /* ========== IMAGEN DEL PRODUCTO ========== */
      .imagen-producto {
        /* Ancho del 100% del contenedor */
        width: 100%;
        /* Alto fijo */
        height: 250px;
        /* Hace que la imagen cubra todo el espacio sin distorsionarse */
        object-fit: cover;
        /* Hace que sea responsive */
        display: block;
      }

      /* ========== CONTENIDO DE LA TARJETA ========== */
      .contenido {
        /* Espacio interno (arriba, derecha, abajo, izquierda) */
        padding: 25px;
      }

      /* ========== CATEGORÍA DEL PRODUCTO ========== */
      .categoria {
        /* Texto pequeño */
        font-size: 12px;
        /* Mayúsculas */
        text-transform: uppercase;
        /* Color gris*/
        color: #888;
        /* Espacio entre letras */
        letter-spacing: 1px;
        /* Espacio inferior */
        margin-bottom: 10px;
      }

      /* ========== TÍTULO DEL PRODUCTO ========== */
      .titulo {
        /* Tamaño grande */
        font-size: 24px;
        /* Grueso */
        font-weight: bold;
        /* Color oscuro */
        color: #333;
        /* Espacio inferior */
        margin-bottom: 10px;
        /* Máximo 2 líneas, si hay más es con puntos suspensivos */
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      /* ========== DESCRIPCIÓN ========== */
      .descripcion {
        /* Tamaño pequeño */
        font-size: 14px;
        /* Color gris */
        color: #666;
        /* Altura de línea para mejor legibilidad */
        line-height: 1.6;
        /* Espacio inferior */
        margin-bottom: 15px;
      }

      /* ========== CALIFICACIÓN (ESTRELLAS) ========== */
      .calificacion {
        /* Espacio inferior */
        margin-bottom: 15px;
        /* Usamos display flex para alinear estrellas y texto */
        display: flex;
        align-items: center;
        gap: 8px; /* Espacio entre estrellas y número */
      }

      .estrellas {
        /* Color naranja para las estrellas */
        color: #ffc107;
        /* Tamaño de las estrellas */
        font-size: 16px;
        /* Mostramos solo 4 estrellas */
        letter-spacing: 2px;
      }

      .num-calificaciones {
        /* Tamaño pequeño */
        font-size: 12px;
        /* Color gris */
        color: #999;
      }

      /* ========== PRECIO ========== */
      .precio-contenedor {
        /* Flexbox para alinear horizontalmente */
        display: flex;
        align-items: center;
        gap: 10px; /* Espacio entre elementos */
        /* Espacio inferior */
        margin-bottom: 20px;
      }

      .precio-actual {
        /* Tamaño grande */
        font-size: 28px;
        /* Color verde para destacar */
        color: #27ae60;
        /* Grueso */
        font-weight: bold;
      }

      .precio-anterior {
        /* Tamaño pequeño */
        font-size: 14px;
        /* Color gris */
        color: #999;
        /* Tachado */
        text-decoration: line-through;
      }

      .descuento {
        /* Fondo rojo */
        background-color: #e74c3c;
        /* Texto blanco */
        color: white;
        /* Padding pequeño */
        padding: 4px 8px;
        /* Esquinas redondeadas */
        border-radius: 4px;
        /* Tamaño pequeño */
        font-size: 12px;
        /* Grueso */
        font-weight: bold;
      }

      /* ========== BOTONES ========== */
      .botones {
        /* Flexbox para alinear botones */
        display: flex;
        gap: 10px; /* Espacio entre botones */
      }

      .boton {
        /* Flex para que crezca igual */
        flex: 1;
        /* Padding para el botón */
        padding: 12px 20px;
        /* Borde redondeado */
        border-radius: 6px;
        /* Sin borde por defecto */
        border: none;
        /* Fuente más grande */
        font-size: 14px;
        /* Grueso */
        font-weight: bold;
        /* Cursor de mano */
        cursor: pointer;
        /* Transición suave */
        transition: all 0.3s ease;
      }

      /* ========== BOTÓN AGREGAR AL CARRITO ========== */
      .boton-agregar {
        /* Fondo azul */
        background-color: #3498db;
        /* Texto blanco */
        color: white;
      }

      /* Efecto hover al pasar ratón */
      .boton-agregar:hover {
        /* Fondo más oscuro */
        background-color: #2980b9;
        /* Escala un poco más grande */
        transform: scale(1.05);
        /* Sombra */
        box-shadow: 0 4px 10px rgba(52, 152, 219, 0.4);
      }

      /* ========== BOTÓN FAVORITO ========== */
      .boton-favorito {
        /* Borde gris */
        border: 2px solid #ddd;
        /* Fondo blanco */
        background-color: white;
        /* Texto gris */
        color: #666;
      }

      /* Efecto hover al pasar ratón */
      .boton-favorito:hover {
        /* Borde rojo */
        border-color: #e74c3c;
        /* Fondo muy claro */
        background-color: #ffe6e6;
        /* Texto rojo */
        color: #e74c3c;
      }

      /* ========== DISPONIBILIDAD ========== */
      .disponibilidad {
        /* Espacio superior */
        margin-top: 15px;
        /* Tamaño pequeño */
        font-size: 12px;
        /* Color verde */
        color: #27ae60;
        /* Flexbox para alinear icono y texto */
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .disponibilidad.agotado {
        /* Si está agotado, cambiar color a rojo */
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <!-- Contenedor principal -->
    <div class="contenedor">
      <!-- IMAGEN DEL PRODUCTO -->
      <img
        src="https://via.placeholder.com/400x250?text=Producto+Premium"
        alt="Laptop Gaming"
        class="imagen-producto"
      />

      <!-- CONTENIDO DE LA TARJETA -->
      <div class="contenido">
        <!-- Categoría -->
        <div class="categoria">Electrónica</div>

        <!-- Título del producto -->
        <h2 class="titulo">Laptop Gaming Pro 2024</h2>

        <!-- Descripción -->
        <p class="descripcion">
          Laptop de alto rendimiento con procesador último gen, perfecta para
          gaming y tareas profesionales.
        </p>

        <!-- Calificaciones -->
        <div class="calificacion">
          <span class="estrellas">★★★★☆</span>
          <span class="num-calificaciones">(245 reseñas)</span>
        </div>

        <!-- Precios -->
        <div class="precio-contenedor">
          <span class="precio-actual">$899</span>
          <span class="precio-anterior">$1,299</span>
          <span class="descuento">-30%</span>
        </div>

        <!-- Botones de acción -->
        <div class="botones">
          <button class="boton boton-agregar">🛒 Agregar</button>
          <button class="boton boton-favorito">❤️ Favorito</button>
        </div>

        <!-- Disponibilidad -->
        <div class="disponibilidad">✓ En stock - Envío gratis</div>
      </div>
    </div>
  </body>
</html>
